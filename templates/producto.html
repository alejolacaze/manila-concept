<!DOCTYPE html>
<html>
  <head>
    <title>Manila Concept — {{ producto.nombre }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>

    <nav>
      <span>Manila Concept</span>
      <ul>
        <li><a href="/">Inicio</a></li>
        <li><a href="#">Productos</a></li>
        <li><a href="/contacto">Contacto</a></li>
        <li><a href="#">🛒 Carrito (0)</a></li>
      </ul>
    </nav>

    <a class="volver" href="/">← Volver al catálogo</a>

    <section class="detalle">
      <img src="{{ url_for('static', filename=producto.imagen) }}">
      <div class="info">
        <h2>{{ producto.nombre }}</h2>
        <p class="precio">${{ producto.precio }}</p>
        <p>{{ producto.descripcion }}</p>
        <div class="talles">
          <div class="talle">S</div>
          <div class="talle">M</div>
          <div class="talle">L</div>
          <div class="talle">XL</div>
        </div>
        <button>Agregar al carrito</button>
      </div>
    </section>

    <footer>
      <p>© 2026 Manila Concept — All rights reserved</p>
    </footer>

  </body>
</html>
