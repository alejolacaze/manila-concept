<!DOCTYPE html>
<html>
  <head>
    <title>Manila Concept — Editar producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
      .form { max-width: 600px; margin: 60px auto; padding: 0 40px; }
      .form h2 { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 32px; }
      .campo { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
      label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
      input, textarea { background-color: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px 16px; color: #fff; font-size: 14px; font-family: Arial, sans-serif; }
      input:focus, textarea:focus { outline: none; border-color: #fff; }
      textarea { height: 100px; resize: none; }
      button { width: 100%; padding: 16px; background-color: #fff; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }
      button:hover { background-color: #ccc; }
    </style>
  </head>
  <body>

    <nav>
      <span>Manila Concept — Admin</span>
      <ul>
        <li><a href="/admin">← Volver al panel</a></li>
      </ul>
    </nav>

    <section class="form">
      <h2>Editar producto</h2>
      <form method="POST">
        <div class="campo">
          <label>Nombre</label>
          <input type="text" name="nombre" value="{{ producto.nombre }}">
        </div>
        <div class="campo">
          <label>Precio</label>
          <input type="number" name="precio" value="{{ producto.precio }}">
        </div>
        <div class="campo">
          <label>Imagen (nombre del archivo)</label>
          <input type="text" name="imagen" value="{{ producto.imagen }}">
        </div>
        <div class="campo">
          <label>Descripción</label>
          <textarea name="descripcion">{{ producto.descripcion }}</textarea>
        </div>
        <button type="submit">Guardar cambios</button>
      </form>
    </section>

  </body>
</html>
