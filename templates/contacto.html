<!DOCTYPE html>
<html>
  <head>
    <title>Manila Concept — Contacto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
      .contacto { max-width: 600px; margin: 60px auto; padding: 0 40px; }
      .contacto h2 { font-size: 28px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
      .contacto p { color: #888; margin-bottom: 40px; font-size: 14px; }
      .campo { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
      label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
      input, textarea { background-color: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px 16px; color: #fff; font-size: 14px; font-family: Arial, sans-serif; }
      input:focus, textarea:focus { outline: none; border-color: #fff; }
      textarea { height: 140px; resize: none; }
      button { width: 100%; padding: 16px; background-color: #fff; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
      button:hover { background-color: #ccc; }
      footer { text-align: center; padding: 24px; color: #444; font-size: 12px; border-top: 1px solid #222; letter-spacing: 2px; margin-top: 60px; }
    </style>
  </head>
  <body>

    <nav>
      <span>Manila Concept</span>
      <ul>
        <li><a href="/">Inicio</a></li>
        <li><a href="/#productos">Productos</a></li>
        <li><a href="/contacto">Contacto</a></li>
        <li><a href="/carrito">🛒 Carrito</a></li>
      </ul>
    </nav>

    <section class="contacto">
  <h2>Contacto</h2>
  <p>Dejanos tu mensaje y te respondemos a la brevedad.</p>

  {% if mensaje_enviado %}
  <div style="background-color: #1a1a1a; border: 1px solid #444; border-radius: 6px; padding: 16px; margin-bottom: 24px; color: #fff; text-align: center; letter-spacing: 2px; font-size: 14px;">
    ✅ ¡Mensaje enviado! Te respondemos a la brevedad.
  </div>
  {% endif %}

  <form method="POST" action="/contacto">
    <div class="campo">
      <label>Nombre</label>
      <input type="text" name="nombre" placeholder="Tu nombre">
    </div>
    <div class="campo">
      <label>Email</label>
      <input type="email" name="email" placeholder="tu@email.com">
    </div>
    <div class="campo">
      <label>Mensaje</label>
      <textarea name="mensaje" placeholder="Escribí tu consulta acá..."></textarea>
    </div>
    <button type="submit">Enviar mensaje</button>
  </form>
</section>

    <footer>
      <p>© 2026 Manila Concept — All rights reserved</p>
    </footer>

  </body>
</html>
